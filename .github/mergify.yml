pull_request_rules:
  - name: Auto-merge for dependency bump pull requests
    conditions:
      - or:
          - author=dependabot[bot]
          - author=github-actions[bot]
      - check-success=All Garnix checks
    actions:
      merge:
        method: squash
queue_rules: []
merge_protections_settings:
  reporting_method: check-runs
